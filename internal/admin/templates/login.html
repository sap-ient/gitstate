{{define "login.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — gitstate admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gs-teal: #2dd4bf;
      --gs-indigo: #6366f1;
      --gs-base: #0b1120;
      --surface-1: #111827;
      --surface-2: #1a2236;
      --border: #2a3147;
      --text: #e5edf6;
      --text-muted: #8595ad;
      --danger: #f87171;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1100px 600px at 18% -10%, rgba(45,212,191,.10), transparent 60%),
        radial-gradient(900px 600px at 100% 110%, rgba(99,102,241,.14), transparent 55%),
        var(--gs-base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface-1));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px 32px;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .brand-mark {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gs-teal), var(--gs-indigo));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: #06121a;
      box-shadow: 0 8px 24px -6px rgba(45,212,191,.5);
    }
    .brand-text { font-weight: 800; font-size: 18px; letter-spacing: -.02em; }
    .brand-badge {
      display: inline-block;
      font-size: 9px; font-weight: 800; letter-spacing: .8px;
      text-transform: uppercase;
      color: #06121a;
      background: var(--gs-teal);
      border-radius: 5px; padding: 2px 6px; margin-top: 3px;
    }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .field input {
      width: 100%;
      background: var(--gs-base);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: var(--gs-teal);
      box-shadow: 0 0 0 3px rgba(45,212,191,.15);
    }
    .field input::placeholder { color: #51607a; }
    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px; font-weight: 700;
      color: #06121a;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gs-teal), var(--gs-indigo));
      transition: filter .15s, transform .05s;
    }
    .btn-submit:hover { filter: brightness(1.08); }
    .btn-submit:active { transform: translateY(1px); }
    .login-error {
      background: rgba(248,113,113,.12);
      border: 1px solid rgba(248,113,113,.35);
      color: var(--danger);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .login-foot {
      margin-top: 22px;
      text-align: center;
      font-size: 11px;
      color: #4a5872;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST" action="/admin/login">
    <div class="brand">
      <div class="brand-mark">gs</div>
      <div>
        <div class="brand-text">gitstate</div>
        <div class="brand-badge">super admin</div>
      </div>
    </div>

    <div class="login-title">Sign in</div>
    <div class="login-sub">Restricted to platform super-admins.</div>

    {{if .Error}}
    <div class="login-error">{{.Error}}</div>
    {{end}}

    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username"
             placeholder="you@gitstate.dev" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password"
             placeholder="••••••••••••" required>
    </div>

    <button class="btn-submit" type="submit">Sign in to console</button>

    <div class="login-foot">gitstate admin console · access is audited</div>
  </form>
</body>
</html>{{end}}
