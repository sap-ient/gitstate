<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Admin{{end}} — gitstate</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gs-teal:    #2dd4bf;
      --gs-indigo:  #818cf8;
      --gs-base:    #0f1117;
      --surface-1:  #161b27;
      --surface-2:  #1e2535;
      --surface-3:  #252d40;
      --border:     #2a3249;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --danger:     #f87171;
      --success:    #34d399;
      --warn:       #fbbf24;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gs-base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ──────────────────────────── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface-1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 28px;
      text-decoration: none;
    }
    .sidebar-logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gs-teal), var(--gs-indigo));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: #0f1117;
    }
    .sidebar-logo-text {
      font-weight: 700; font-size: 15px; color: var(--text);
    }
    .sidebar-logo-badge {
      font-size: 9px;
      background: var(--gs-teal);
      color: #0f1117;
      border-radius: 4px;
      padding: 1px 5px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .nav-label {
      padding: 0 20px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: all .15s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover { color: var(--text); background: var(--surface-2); }
    .nav-link.active {
      color: var(--gs-teal);
      background: rgba(45,212,191,.07);
      border-left-color: var(--gs-teal);
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px 0;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .realtime-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .35; }
    }

    /* ── Main layout ──────────────────────── */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 32px 36px;
      max-width: 1200px;
    }

    /* ── Page header ─────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Stat tiles ──────────────────────── */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .tile {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color .2s;
    }
    .tile:hover { border-color: var(--gs-indigo); }
    .tile-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .tile-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .tile-value.teal { color: var(--gs-teal); }
    .tile-value.indigo { color: var(--gs-indigo); }
    .tile-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Cards ───────────────────────────── */
    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    /* ── Tables ──────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-3); }

    /* ── Badges ──────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-teal   { background: rgba(45,212,191,.15); color: var(--gs-teal); }
    .badge-indigo { background: rgba(129,140,248,.15); color: var(--gs-indigo); }
    .badge-warn   { background: rgba(251,191,36,.15);  color: var(--warn); }
    .badge-danger { background: rgba(248,113,113,.15); color: var(--danger); }
    .badge-muted  { background: var(--surface-3); color: var(--text-muted); }

    /* ── Forms / Search ─────────────────── */
    .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .input {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .input:focus { border-color: var(--gs-teal); }
    .input::placeholder { color: var(--text-muted); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
    }
    .btn-teal   { background: var(--gs-teal);   color: #0f1117; }
    .btn-teal:hover { filter: brightness(1.1); }
    .btn-ghost  { background: var(--surface-3); color: var(--text-muted); }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--danger); }
    .btn-danger:hover { background: rgba(248,113,113,.25); }

    /* ── Pagination ─────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Sparkline (SVG-based) ──────────── */
    .sparkline-wrap {
      overflow: hidden;
      border-radius: 8px;
    }

    /* ── Plan distribution bars ─────────── */
    .plan-bars { display: flex; flex-direction: column; gap: 10px; }
    .plan-row { display: flex; align-items: center; gap: 12px; }
    .plan-name { font-size: 12px; min-width: 70px; color: var(--text-muted); }
    .plan-bar-track {
      flex: 1;
      height: 8px;
      background: var(--surface-3);
      border-radius: 99px;
      overflow: hidden;
    }
    .plan-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gs-teal), var(--gs-indigo));
      transition: width .4s ease;
    }
    .plan-count {
      font-size: 12px;
      color: var(--text);
      min-width: 28px;
      text-align: right;
    }

    /* ── Toast for htmx mutations ────────── */
    .toast-area {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 100;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateY(12px); opacity: 0; } }

    /* ── SSE realtime badge ─────────────── */
    #realtime-status { display: inline-flex; align-items: center; gap: 5px; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <a href="/admin" class="sidebar-logo">
      <div class="sidebar-logo-mark">gs</div>
      <div>
        <div class="sidebar-logo-text">gitstate</div>
        <div class="sidebar-logo-badge">super admin</div>
      </div>
    </a>

    <div class="nav-label">Console</div>
    <a href="/admin"       class="nav-link {{if eq .ActivePage "analytics"}}active{{end}}">
      <span class="nav-icon">◈</span> Analytics
    </a>
    <a href="/admin/users" class="nav-link {{if eq .ActivePage "users"}}active{{end}}">
      <span class="nav-icon">◉</span> Users
    </a>
    <a href="/admin/orgs"  class="nav-link {{if eq .ActivePage "orgs"}}active{{end}}">
      <span class="nav-icon">◎</span> Organizations
    </a>

    <div class="sidebar-footer">
      {{if .Realtime}}
        <div id="realtime-status">
          <span class="realtime-dot"></span>realtime on
        </div>
      {{end}}
      <div style="margin-top:8px">{{.CurrentUser.Email}}</div>
    </div>
  </nav>

  <main class="main">
    {{block "content" .}}{{end}}
  </main>

  <div class="toast-area" id="toast-area"></div>

  <script>
    // Toast helper called from htmx event handlers
    function showToast(msg, ok) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.borderColor = ok ? 'var(--gs-teal)' : 'var(--danger)';
      t.textContent = msg;
      document.getElementById('toast-area').appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }
    document.addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.requestConfig.verb !== 'get') {
        const ok = e.detail.xhr.status < 300;
        const msg = ok ? 'Done.' : (e.detail.xhr.responseText || 'Request failed');
        showToast(msg, ok);
      }
    });
  </script>
  {{block "scripts" .}}{{end}}
</body>
</html>
